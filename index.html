<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lorenzo Mitestainer Guirelli — Currículo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

            <div class="bizphoto">
              <img src="assets/img/profile/p-01.jpg" alt="Foto de perfil">

            <div>

      <section class="content">
        <div class="block">

            <span class="circle c1"></span>
            <h2 class="section-title">HABILIDADES E COMPETÊNCIAS</h2>

          <div class="icons">

            <div class="icon"><img class="skill-icon" src="assets/svg/skills/chatgpt.svg"></div>
          </div>
        </div>
      </section>
    </article>
  </main>

</html>
