<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Currículo — Lorenzo Mitestainer Guirelli</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main class="stage">
    <section class="paper" aria-label="Currículo">

      <header class="card" id="topo">
        <div class="card-inner">

          <div class="card-photo">
            <img class="clip" src="./assets/svg/clips.svg" alt="" aria-hidden="true">
            <img id="profilePhoto" src="./assets/img/profile/p-01.jpg" alt="Foto de perfil de Lorenzo Mitestainer Guirelli">
          </div>

          <div class="card-info">
            <h1 class="name">Lorenzo Mitestainer Guirelli</h1>
            <p class="headline">Marketing Digital · Produção de Conteúdo · Automação e Inteligência Artificial</p>

            <div class="card-meta">
              <a href="https://wa.me/5519997791295" target="_blank" rel="noreferrer">(19) 99779-1295</a>
              <a href="mailto:guirellilorenzo1@gmail.com">guirellilorenzo1@gmail.com</a>
              <a href="https://www.linkedin.com/in/lorenzo-mitestainer-guirelli-9b455916b/" target="_blank" rel="noreferrer">LinkedIn</a>
            </div>
          </div>

          <div class="card-qr">
            <div class="qr-frame">
              <img src="./assets/img/qr.png" alt="QR Code do LinkedIn">
            </div>
          </div>

        </div>
      </header>

      <div class="content">
        <!-- restante do conteúdo permanece igual -->
      </div>
    </section>
  </main>

  <script>
    (function () {
      const el = document.getElementById("profilePhoto");
      if (!el) return;

      const photos = [
        "./assets/img/profile/p-01.jpg",
        "./assets/img/profile/p-02.jpg",
        "./assets/img/profile/p-03.jpg",
      ];

      el.src = photos[Math.floor(Math.random() * photos.length)];
    })();
  </script>
</body>
</html>
